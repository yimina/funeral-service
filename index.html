<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모바일/웹 추모 방명록 - 삼가 고인의 명복을 빕니다</title>
  
  <!-- SEO 메타 데이터 -->
  <meta name="description" content="故인을 조문하며 소중한 위로의 마음을 나누는 모바일 방명록 서비스입니다.">
  <meta name="keywords" content="방명록, 추모, 장례식장, 모바일방명록, 온라인조문">
  
  <!-- 스타일시트 로드 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 1. 관리자 상단 바 (관리자 모드 로그인 시 노출) -->
  <div id="admin-top-bar" class="admin-top-bar">
    <div class="admin-controls-group">
      <span>⚙️ 관리자 모드 실행 중</span>
      <span id="gs-status-badge" class="visitor-relation">로컬 저장소 전용 모드</span>
    </div>
    <div class="admin-controls-group">
      <button id="admin-settings-btn" class="admin-btn">환경 설정</button>
      <button id="admin-export-btn" class="admin-btn">엑셀(CSV) 다운로드</button>
      <button id="admin-logout-btn" class="admin-btn logout-btn">로그아웃</button>
    </div>
  </div>

  <div class="container">
    
    <!-- 2. 헤더 & 추모 정보 -->
    <header class="header-tribute">
      <!-- 촛불 SVG 그래픽 -->
      <div class="candle-area">
        <svg class="candle-svg" width="60" height="85" viewBox="0 0 60 85" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 촛대 심지 -->
          <line x1="30" y1="32" x2="30" y2="42" stroke="#3A2E26" stroke-width="2"/>
          <!-- 촛불 (애니메이션 적용 타겟) -->
          <path class="flame" d="M30 5C36 18 37 32 30 32C23 32 24 18 30 5Z" fill="url(#flameGradient)"/>
          <!-- 초 몸통 -->
          <path d="M16 42H44V85H16V42Z" fill="url(#candleGradient)" rx="2"/>
          <!-- 흘러내린 촛농 묘사 -->
          <path d="M16 42C21 44 26 40 31 43C36 46 41 42 44 42V48C41 48 36 50 31 47C26 45 21 49 16 48V42Z" fill="#D4BD9C" opacity="0.6"/>
          
          <defs>
            <linearGradient id="flameGradient" x1="30" y1="5" x2="30" y2="32" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#FFEBB3"/>
              <stop offset="35%" stop-color="#FFA826"/>
              <stop offset="100%" stop-color="#FF4000"/>
            </linearGradient>
            <linearGradient id="candleGradient" x1="16" y1="42" x2="44" y2="85" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#DFCFB7"/>
              <stop offset="50%" stop-color="#C5A880"/>
              <stop offset="100%" stop-color="#99774E"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      
      <h1>
        <span class="deceased-main-title" id="deceased-main-title">故</span>
        <span class="baptismal-line" id="deceased-baptismal-line"></span>
        <span class="tribute-sub-title">삼가 고인의 명복을 빕니다</span>
      </h1>
      <p class="sub-message">모바일 추모 방명록</p>
      
      <!-- 故인 및 장례 정보 표시 카드 -->
      <div class="deceased-info">
        <div class="deceased-info-row">
          <div class="deceased-info-label">고인</div>
          <div class="deceased-info-value bold">故 <span id="deceased-name"></span></div>
        </div>
        <div class="deceased-info-row">
          <div class="deceased-info-label">세례명</div>
          <div class="deceased-info-value" id="deceased-baptismal"></div>
        </div>
        <div class="deceased-info-row">
          <div class="deceased-info-label">별세</div>
          <div class="deceased-info-value" id="deceased-passing"></div>
        </div>
        <div class="deceased-info-row">
          <div class="deceased-info-label">배우자</div>
          <div class="deceased-info-value" id="deceased-spouse"></div>
        </div>
        <div class="deceased-info-row">
          <div class="deceased-info-label">아들</div>
          <div class="deceased-info-value" id="deceased-sons"></div>
        </div>
        <div class="deceased-info-row">
          <div class="deceased-info-label">딸</div>
          <div class="deceased-info-value" id="deceased-daughters"></div>
        </div>
      </div>
    </header>

    <main>
      <!-- 3. 방명록 작성 카드 -->
      <section class="card">
        <h2 class="card-title">
          <!-- 펜 아이콘 SVG -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
          </svg>
          추모의 글 남기기
        </h2>
        <form id="guestbook-form">
          <div class="form-group-row">
            <div class="form-group">
              <label for="visitor-name">조문객 성함</label>
              <input type="text" id="visitor-name" class="input-field" placeholder="성함을 입력해주세요" required autocomplete="off">
            </div>
            <div class="form-group">
              <label for="visitor-relation">고인과의 관계 / 소속</label>
              <select id="visitor-relation" class="input-field" required>
                <option value="" disabled selected>관계를 선택해주세요</option>
                <option value="가족/친지">가족 / 친지</option>
                <option value="친구">친구</option>
                <option value="직장/단체">직장 / 단체</option>
                <option value="기타">기타 (이웃, 지인 등)</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="write-message-checkbox">
              추모 메시지 직접 작성하기 (체크 안 하면 "삼가 고인의 명복을 빕니다"로 등록됩니다)
            </label>
          </div>
          <div class="form-group" id="message-field-group" style="display: none;">
            <label for="visitor-message">추모 메시지</label>
            <textarea id="visitor-message" class="input-field" placeholder="따뜻한 위로와 아버님을 추모하는 한마디를 남겨주세요."></textarea>
          </div>
          <button type="submit" class="submit-btn">추모 글 등록</button>
        </form>
      </section>

      <!-- 4. 방명록 목록 피드 & 필터 -->
      <section>
        <div class="search-filter-section">
          <div class="form-group">
            <label for="search-input">방명록 검색</label>
            <input type="text" id="search-input" class="input-field" placeholder="조문객 이름 또는 메시지로 찾기..." autocomplete="off">
          </div>
          <!-- 빠른 필터 바 -->
          <div id="filter-bar" class="filter-bar">
            <!-- JS로 버튼 동적 렌더링 -->
          </div>
        </div>

        <!-- 방명록 리스트 -->
        <div id="guestbook-list" class="guestbook-list">
          <!-- JS로 방명록 카드 동적 렌더링 -->
        </div>
      </section>
    </main>

    <!-- 5. 푸터 영역 -->
    <footer class="admin-footer">
      <button id="admin-login-btn" class="admin-login-link">유가족 관리자 모드</button>
    </footer>
  </div>

  <!-- 6. 공용 모달 창 레이아웃 -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
      <h2 id="modal-title" class="modal-header">알림</h2>
      <div id="modal-body">
        <!-- 모달 본문 영역 (JS 주입) -->
      </div>
      <div class="modal-buttons">
        <button id="modal-cancel-btn" class="modal-btn modal-btn-cancel">취소</button>
        <button id="modal-confirm-btn" class="modal-btn modal-btn-confirm">확인</button>
      </div>
    </div>
  </div>

  <!-- 7. 알림 메시지 토스트 컨테이너 -->
  <div id="toast-container" class="toast-container"></div>

  <!-- 자바스크립트 로드 -->
  <script src="app.js"></script>
</body>
</html>
